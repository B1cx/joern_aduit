name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BINARY_NAME: joern_audit
  MODULE_PATH: github.com/joern-audit/joern_audit/internal/config

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Get version info
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          LDFLAGS="-s -w -X ${MODULE_PATH}.Version=${{ steps.meta.outputs.version }} -X ${MODULE_PATH}.BuildTime=${{ steps.meta.outputs.build_time }}"
          SUFFIX=""
          if [ "${{ matrix.goos }}" = "windows" ]; then SUFFIX=".exe"; fi
          go build -ldflags "$LDFLAGS" -o "${BINARY_NAME}${SUFFIX}" ./cmd/joern_audit

      - name: Package
        run: |
          SUFFIX=""
          ARCHIVE_EXT="tar.gz"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            SUFFIX=".exe"
            ARCHIVE_EXT="zip"
          fi

          ARCHIVE_NAME="${BINARY_NAME}_${{ steps.meta.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}"

          mkdir -p "${ARCHIVE_NAME}"
          cp "${BINARY_NAME}${SUFFIX}" "${ARCHIVE_NAME}/"
          cp README.md "${ARCHIVE_NAME}/"

          if [ "$ARCHIVE_EXT" = "zip" ]; then
            zip -r "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}"
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY_NAME }}_*.*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums_sha256.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
              git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges
            else
              git log --pretty=format:"- %s (%h)" --no-merges -20
            fi
            echo ""
            echo ""
            echo "## Checksums (SHA-256)"
            echo ""
            echo '```'
            cat dist/checksums_sha256.txt
            echo '```'
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: dist/*
