id: PHP-XSS-001
name: Cross-Site Scripting via Unescaped Output
language: php
severity: medium
cwe: CWE-79
category: injection

# Detect user input reaching echo/print without htmlspecialchars
query: |
  cpg.call(".*(?:echo|print|print_r|printf|sprintf|die|exit).*")
    .where(_.argument.reachableBy(cpg.method.parameter))
    .l

sources:
  - pattern: "cpg.call('.*\\$_GET.*')"
    description: "$_GET superglobal"
  - pattern: "cpg.call('.*\\$_POST.*')"
    description: "$_POST superglobal"
  - pattern: "cpg.call('.*\\$_REQUEST.*')"
    description: "$_REQUEST superglobal"
  - pattern: "cpg.call('.*\\$_COOKIE.*')"
    description: "$_COOKIE superglobal"
  - pattern: "cpg.call('.*\\$_SERVER.*')"
    description: "$_SERVER superglobal (HTTP_REFERER, QUERY_STRING, etc.)"

sinks:
  - pattern: "cpg.call('.*echo.*')"
    description: "echo statement — direct HTML output"
  - pattern: "cpg.call('.*print.*')"
    description: "print/printf — direct output"
  - pattern: "cpg.call('.*die.*')"
    description: "die()/exit() with output"

sanitizers:
  - pattern: "htmlspecialchars() with ENT_QUOTES"
  - pattern: "htmlentities()"
  - pattern: "strip_tags()"
  - pattern: "Twig {{ var }} auto-escaping (vs {{ var|raw }})"
  - pattern: "Blade {{ $var }} auto-escaping (vs {!! $var !!})"
  - pattern: "Content-Type: application/json header"

guided_questions:
  - "用户输入在 echo/print 输出前是否经过 htmlspecialchars() 或 htmlentities()？"
  - "htmlspecialchars() 是否使用了 ENT_QUOTES flag？不带此 flag 则单引号不被转义。"
  - "如果使用 Twig/Blade 模板引擎，是否用了安全的输出语法（{{ }} 而非 {!! !!} 或 |raw）？"
  - "输出上下文是什么？HTML body、attribute、JavaScript 或 URL 参数？"
  - "是否有全局 XSS Filter 中间件？"

description: |
  检测 PHP XSS 模式：

  1. 反射型 XSS:
     - echo $_GET['name'];
     - print($_POST['data']);

  2. 存储型 XSS:
     - 从数据库读取用户输入 → echo 不转义

  3. 模板引擎不安全输出:
     - Twig: {{ var|raw }}
     - Blade: {!! $var !!}
