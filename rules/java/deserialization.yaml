id: JAVA-DESER-001
name: Unsafe Deserialization (ObjectInputStream, Fastjson, etc.)
language: java
severity: critical
cwe: CWE-502
category: deserialization

# Query: only match actual deserialization method calls
# Exclude: parseInt, parseDate, parseDateToStr, parseFloat, parseLong, parseBoolean,
#           parse(userAgent), Properties.load(), Workbook.load(), etc.
query: |
  cpg.call(".*(?:readObject|readUnshared).*")
    .where(_.code(".*ObjectInputStream.*"))
    .l

sources:
  - pattern: "cpg.call('.*getInputStream.*')"
    description: "HTTP request input stream"
  - pattern: "cpg.method.parameter.typeFullName('.*byte\\[\\].*')"
    description: "Raw byte array parameters"
  - pattern: "cpg.call('.*getCookie.*')"
    description: "Cookie values (e.g., rememberMe)"
  - pattern: "cpg.call('.*getHeader.*')"
    description: "HTTP headers"
  - pattern: "cpg.call('.*getParameter.*')"
    description: "HTTP request parameters"
  - pattern: "cpg.call('.*getRequestBody.*')"
    description: "HTTP request body"

sinks:
  # 1. Java native deserialization — highest risk
  - pattern: "cpg.call('.*readObject.*').where(_.code('.*ObjectInputStream.*'))"
    description: "ObjectInputStream.readObject() / readUnshared()"

  # 2. XMLDecoder — high risk
  - pattern: "cpg.call('.*readObject.*').where(_.code('.*XMLDecoder.*'))"
    description: "XMLDecoder.readObject()"

  # 3. Fastjson — only parseObject (not generic parse/parseDate/parseInt)
  - pattern: "cpg.call('.*parseObject.*').where(_.code('.*JSON.*'))"
    description: "Fastjson JSON.parseObject() with potential autoType"

  # 4. XStream — fromXML
  - pattern: "cpg.call('.*fromXML.*').where(_.code('.*XStream.*'))"
    description: "XStream.fromXML()"

  # 5. SnakeYAML — Yaml().load, not Properties.load/ClassLoader.load
  - pattern: "cpg.call('.*\\.load.*').where(_.code('.*Yaml.*'))"
    description: "Yaml.load() without SafeConstructor"

sanitizers:
  - pattern: "ObjectInputFilter / deserialization whitelist"
  - pattern: "Custom ObjectInputStream with class filtering (e.g., AntObjectInputStream)"
  - pattern: "Look-ahead deserialization pattern"
  - pattern: "Fastjson with autoType disabled or safeMode"
  - pattern: "Yaml with SafeConstructor"
  - pattern: "JSON parse of server-side HTTP response (not user input)"

guided_questions:
  - "反序列化的数据来源是否不可信（网络请求、Cookie、用户上传）？"
  - "是否有ObjectInputFilter或类白名单限制可反序列化的类型？"
  - "使用的是哪个序列化库？版本是否存在已知漏洞？"
  - "Classpath中是否有已知的gadget chain（Commons Collections, Spring等）？"
  - "对于Fastjson，是否启用了autoType？是否可以通过@type指定任意类？"
  - "对于SnakeYAML，是否使用了SafeConstructor？"
  - "是否有自定义的反序列化过滤器（如AntObjectInputStream）？"
  - "JSONObject.parseObject() 解析的数据来源是用户输入还是内部API响应？"

description: |
  检测不安全反序列化漏洞：

  1. Java原生反序列化：
     - ObjectInputStream.readObject(untrustedData)
     - 需要gadget chain（如Commons Collections）
     - 示例：Shiro rememberMe反序列化

  2. Fastjson反序列化RCE：
     - JSON.parseObject(userJson) with autoType
     - @type指定恶意类触发RCE
     - 注意：JSON.parseObject() 解析内部API响应不算漏洞

  3. SnakeYAML反序列化：
     - new Yaml().load(userYaml)
     - 使用!!标签指定恶意类
     - 需要使用SafeConstructor

  4. XStream反序列化：
     - xstream.fromXML(userXml)
     - XML注入恶意类

  不匹配以下安全的 parse/load 调用：
  - Integer.parseInt(), Long.parseLong(), Float.parseFloat()
  - SimpleDateFormat.parse(), DateUtils.parseDate()
  - Properties.load(), ClassLoader.loadClass()
  - UserAgent.parse(), Pattern.matcher()
